<style>

  margin: 0;
  padding: 0;
  border: 0;
  overflow: hidden;
}
</style>
<div id="sumgridApp" class="center">
<div class="app">
    <div class="card boardCard">
    <div id="grid" class="gridWrap" aria-label="퍼즐 보드"></div>
    </div>
  </div>
</div>

<style>

/* Tistory container safety */
#sumgridApp {
  width: 100%;

  display: flex;

}
#sumgridApp.top { align-items: flex-start; }

#sumgridApp{

#sumgridApp button{
      border:1px solid rgba(255,255,255,.10);

#sumgridApp button:hover{ background: rgba(255,255,255,.10); border-color: rgba(255,255,255,.16); }

#sumgridApp .sizeBar{
      display:flex;

    }
#sumgridApp .sizeBtn{
      height: 28px;
      min-width: 28px;
      padding: 0 10px;
      border-radius: 10px;

#sumgridApp .gridWrap{
      display:grid;

#sumgridApp .clearText{
      position:absolute;
      inset:0;

      letter-spacing: .08em;
      color: rgba(57,217,138,.92);
      text-shadow: 0 0 16px rgba(57,217,138,.35), 0 0 30px rgba(57,217,138,.25);

      animation: sumgridClearPop .9s ease-out both;

#sumgridApp .clearFlash{

#sumgridApp .targetCell.clearFlash .target,
#sumgridApp .targetCell.clearFlash .badge{
      color: var(--ok);
      border-color: rgba(57,217,138,.45);
    }
@keyframes sumgridClearFlash {
  0% { transform: scale(1); box-shadow: 0 8px 18px rgba(0,0,0,.22); }
  35% { transform: scale(1.05); box-shadow: 0 0 0 2px rgba(57,217,138,.35), 0 12px 24px rgba(0,0,0,.24); }

}
@keyframes sumgridClearPop {
  0% { opacity: 0; transform: scale(.9); }
  25% { opacity: 1; transform: scale(1.06); }
  100% { opacity: 0; transform: scale(1); }
}
#sumgridApp .cell{

#sumgridApp .cornerBtn{
      width: var(--cell,72px);

#sumgridApp .cornerBtn:hover{

#sumgridApp .cornerBtn:active{ transform: translateY(1px); }
#sumgridApp .numBtn{
      width: var(--cell,72px); height: var(--cell,72px);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.10);
      color:var(--text);
      font-size:22px;
      font-weight:900;
      letter-spacing:.2px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      box-shadow: 0 8px 18px rgba(0,0,0,.22);
          touch-action: manipulation;

    }
#sumgridApp .numBtn:hover{ background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.03)); }
#sumgridApp .numBtn.selected{
      border-color: rgba(57,217,138,.65);
      background: linear-gradient(180deg, rgba(57,217,138,.24), rgba(57,217,138,.08));
    }
#sumgridApp /* Excluded (right-click) */
    .numBtn.excluded{
      opacity: .65;
      filter: grayscale(.85) saturate(.2);
      border-color: rgba(255,255,255,.10);
      background: rgba(0,0,0,.28);

#sumgridApp .badge{
      position:absolute;

#sumgridApp .badge.ok{ color: var(--ok); border-color: rgba(57,217,138,.45); background: rgba(57,217,138,.08); }
#sumgridApp .badge.bad{ color: var(--bad); border-color: rgba(255,92,122,.45); background: rgba(255,92,122,.08); }
#sumgridApp .target{
      font-size:18px;
      font-weight:900;
      color: rgba(255,255,255,.92);
    }
#sumgridApp .target.ok{ color: var(--ok); }
#sumgridApp .target.bad{ color: var(--bad); }
#sumgridApp .sub{
      color:var(--muted);
      font-size:12px;
    }
#sumgridApp .kpi{
      display:grid;

    }
#sumgridApp .kpi .box{

#sumgridApp .kpi .label{ color:var(--muted); font-size:12px; }
#sumgridApp .kpi .value{ font-weight:900; font-size:18px; margin-top:2px; }
#sumgridApp .help{

    }
#sumgridApp .toast{
      padding:12px 14px;

#sumgridApp .toast.show{ display:block; }
#sumgridApp .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }

<script>
(() => {
  const root = document.getElementById('sumgridApp');
  if (!root) return;

  // --- SFX: AudioContext + pool ---
  const __SFX_SRC = { left: '1.mp3', right: '2.mp3', corner: '3.mp3' };
  const __SFX_BUF = {};
  const __SFX_POOL = { left: [], right: [], corner: [] };
  const POOL_SIZE = 3;
  let __actx = null;

  function getActx(){
    if (!__actx){
      try { __actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
    }
    if (__actx && __actx.state === 'suspended'){
      try { __actx.resume(); } catch(e){}
    }
    return __actx;
  }

  function loadBuf(kind){
    const actx = getActx();
    if (!actx || __SFX_BUF[kind]) return;
    fetch(__SFX_SRC[kind])
      .then(r => r.arrayBuffer())
      .then(ab => actx.decodeAudioData(ab))
      .then(buf => {
        __SFX_BUF[kind] = buf;
      }).catch(()=>{});
  }

  // 사용자 첫 터치/클릭 시 AudioContext 언락 + 버퍼 로드
  function unlockAudio(){
    getActx();
    Object.keys(__SFX_SRC).forEach(loadBuf);
    document.removeEventListener('pointerdown', unlockAudio);
    document.removeEventListener('click', unlockAudio);
  }
  document.addEventListener('pointerdown', unlockAudio, { once: true, passive: true });
  document.addEventListener('click', unlockAudio, { once: true, passive: true });

  // 초기 로드 시도 (자동재생 정책으로 실패해도 unlock 후 재시도)
  Object.keys(__SFX_SRC).forEach(loadBuf);

  function playSfx(kind){
    const actx = getActx();
    const buf = __SFX_BUF[kind];
    if (!actx || !buf) {
      // fallback: 버퍼 없으면 pool Audio 사용
      if (!__SFX_POOL[kind] || __SFX_POOL[kind].length === 0){
        for(let i=0;i<POOL_SIZE;i++){
          const a = new Audio(__SFX_SRC[kind]);
          a.preload = 'auto';
          __SFX_POOL[kind].push(a);
        }
      }
      const pool = __SFX_POOL[kind];
      const a = pool.find(x => x.paused || x.ended) || pool[0];
      try { a.currentTime = 0; } catch(e){}
      try { const p = a.play(); if(p) p.catch(()=>{}); } catch(e){}
      return;
    }
    try {
      if (actx.state === 'suspended') actx.resume();
      const src = actx.createBufferSource();
      src.buffer = buf;
      src.connect(actx.destination);
      src.start(0);
    } catch(e){}
  }

  if (!root) return;

(() => {
  let N = 4;

  const elGrid = root.querySelector('#grid');
  let stage = 1;
  let grid = [];           // numbers
  let rowTarget = [];
  let colTarget = [];
  let selected = [];       // confirmed selection (0/1)
  let excluded = [];       // excluded (0/1)
  let isClearing = false;
  let clearTimer = null;


  function applyGridLayout(){
    const gN = N + 1;
    elGrid.style.setProperty('--gN', String(gN));

    const vv = window.visualViewport;
    const vw = (vv && vv.width)  ? vv.width  : (window.innerWidth  || 0);
    const vh = (vv && vv.height) ? vv.height : (window.innerHeight || 0);

    // 너비/높이 중 작은 값 기준으로 꽉 채움 (패딩 32px 확보)
    const PADDING = 32;
    const maxFromW = Math.max(280, vw - PADDING);
    const maxFromH = Math.max(280, vh - PADDING);
    const available = Math.min(maxFromW, maxFromH);

    const gap = Math.max(6, Math.floor(available * 0.018));
    const cell = Math.max(34, Math.floor((available - gap * (gN - 1)) / gN));

    elGrid.style.setProperty('--cell', cell + 'px');
    elGrid.style.setProperty('--gap', gap + 'px');
  }

  function setSize(n){
    N = n;
    applyGridLayout();
    stage = 1;
    generatePuzzle();
  }

  // Refit on orientation/viewport changes (mobile address bar, rotation)
  window.addEventListener('resize', () => {
    applyGridLayout();
    render();
  }, {passive:true});

  function updateBodyFit(){
    const appEl = root.querySelector('.app');
    if (!appEl) return;
    const vv = window.visualViewport;
    const vh = (vv && vv.height) ? vv.height : (window.innerHeight || 0);
    const appH = appEl.scrollHeight || appEl.getBoundingClientRect().height;
    const needsTop = (appH + 8) > vh;
    root.classList.toggle('top', needsTop);
    root.classList.toggle('center', !needsTop);
  }

  // iOS Safari address bar / visual viewport changes
  if (window.visualViewport){
    window.visualViewport.addEventListener('resize', () => { applyGridLayout(); render(); }, {passive:true});
    window.visualViewport.addEventListener('scroll', () => { updateBodyFit(); }, {passive:true});
  }


  function randInt(min, maxInclusive){
    return Math.floor(Math.random() * (maxInclusive - min + 1)) + min;
  }

  function makeEmptyMask(){
    return Array.from({length:N}, () => Array.from({length:N}, () => 0));
  }

  function generatePuzzle(){
    if (clearTimer){
      clearTimeout(clearTimer);
      clearTimer = null;
    }
    isClearing = false;
    // 1) grid numbers 1..9
    grid = Array.from({length:N}, () => Array.from({length:N}, () => randInt(1,9)));

    // 2) random mask just to generate targets
    const ans = makeEmptyMask();

    // ensure each row picks at least 1 and at most N-1
    for (let r=0; r<N; r++){
      const k = randInt(1, N-1);
      const cols = [...Array(N).keys()].sort(()=>Math.random()-0.5).slice(0,k);
      cols.forEach(c => ans[r][c] = 1);
    }
    // ensure each column has at least 1 selected
    for (let c=0; c<N; c++){
      let cnt = 0;
      for (let r=0; r<N; r++) cnt += ans[r][c];
      if (cnt === 0){
        const rPick = randInt(0, N-1);
        ans[rPick][c] = 1;
      }
    }

    // 3) compute targets
    rowTarget = Array(N).fill(0);
    colTarget = Array(N).fill(0);
    for (let r=0; r<N; r++){
      for (let c=0; c<N; c++){
        if (ans[r][c]){
          rowTarget[r] += grid[r][c];
          colTarget[c] += grid[r][c];
        }
      }
    }

    // 4) reset player state
    selected = makeEmptyMask();
    excluded = makeEmptyMask();

    render();
    updateStatus();
  }

  function sumRow(mask, r){
    let s = 0;
    for (let c=0; c<N; c++) s += grid[r][c] * (mask[r][c] ? 1 : 0);
    return s;
  }
  function sumCol(mask, c){
    let s = 0;
    for (let r=0; r<N; r++) s += grid[r][c] * (mask[r][c] ? 1 : 0);
    return s;
  }

  function getRowState(r){
    const s = sumRow(selected, r);
    if (s === rowTarget[r]) return "ok";
    if (s > rowTarget[r]) return "bad";
    return "idle";
  }
  function getColState(c){
    const s = sumCol(selected, c);
    if (s === colTarget[c]) return "ok";
    if (s > colTarget[c]) return "bad";
    return "idle";
  }

  function isCleared(){
    for (let r=0; r<N; r++){
      if (sumRow(selected, r) !== rowTarget[r]) return false;
    }
    for (let c=0; c<N; c++){
      if (sumCol(selected, c) !== colTarget[c]) return false;
    }
    return true;
  }

  function updateStatus(){
    if (isClearing) return;
    if (!isCleared()) return;

    isClearing = true;
    render();

    clearTimer = setTimeout(() => {
      stage++;
      generatePuzzle();
    }, 900);
  }

  function onCellLeftClick(r, c){
    if (isClearing) return;
    if (excluded[r][c]) return;            // excluded -> cannot select
    playSfx('left');
    selected[r][c] = selected[r][c] ? 0 : 1;
    render();
    updateStatus();
  }

  function onCellRightClick(r, c){
    if (isClearing) return;
    playSfx('right');
    excluded[r][c] = excluded[r][c] ? 0 : 1;
    if (excluded[r][c]) selected[r][c] = 0; // exclude clears selection
    render();
    updateStatus();
  }

  function render(){
    elGrid.innerHTML = "";

    // 5×5 layout:
    // (r,c) [0..3,0..3] => number buttons
    // (r,4) => row target & state
    // (4,c) => col target & state
    // (4,4) => corner
    for (let r=0; r<N+1; r++){
      for (let c=0; c<N+1; c++){
        if (r < N && c < N){
          const b = document.createElement('button');
          b.className = 'numBtn';
          b.type = 'button';
          b.textContent = grid[r][c];

          if (selected[r][c]) b.classList.add('selected');
          if (isClearing && selected[r][c]) b.classList.add('clearFlash');
          if (excluded[r][c]) b.classList.add('excluded');

          // Click: select / toggle
          let suppressClick = false;

          b.addEventListener('click', (e) => {
            if (suppressClick){
              suppressClick = false;
              e.preventDefault();
              e.stopPropagation();
              return;
            }
            onCellLeftClick(r, c);
          });

          // Right-click (desktop): exclude / include
          b.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            onCellRightClick(r, c);
          });

          // Long-press (touch): exclude / include
          // - short tap => select (handled by click)
          // - long press => exclude, and suppress the subsequent click
          let lpTimer = null;
          let moved = false;

          const isTouchPointer = (ev) => (ev && ev.pointerType === 'touch');
          const isCoarse = () => (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);

          b.addEventListener('pointerdown', (ev) => {
            if (!isTouchPointer(ev) && !isCoarse()) return;
            try{ ev.preventDefault(); }catch(_){ }
            try{ b.setPointerCapture(ev.pointerId); }catch(_){ }
            if (excluded[r][c]) {
              // still allow long-press to un-exclude
            }
            moved = false;
            if (lpTimer) clearTimeout(lpTimer);

            lpTimer = setTimeout(() => {
              if (moved) return;
              suppressClick = true;
              onCellRightClick(r, c);
            }, 520);
          });

          b.addEventListener('pointermove', (ev) => {
            if (!lpTimer) return;
            // any movement cancels long-press
            moved = true;
            clearTimeout(lpTimer);
            lpTimer = null;
          });

          const clearLP = () => {
            if (lpTimer) clearTimeout(lpTimer);
            lpTimer = null;
          };

          b.addEventListener('pointerup', clearLP);
          b.addEventListener('pointercancel', clearLP);

          elGrid.appendChild(b);
        } else if (r < N && c === N){
          // row target cell
          const d = document.createElement('div');
          d.className = 'cell targetCell';
          if (isClearing) d.classList.add('clearFlash');
          const state = getRowState(r);

          const badge = document.createElement('div');
          badge.className = 'badge';
          badge.textContent = `${sumRow(selected,r)}`; // show only current sum
          if (state === "ok") badge.classList.add('ok');
          if (state === "bad") badge.classList.add('bad');

          const t = document.createElement('div');
          t.className = 'target';
          t.textContent = rowTarget[r];
          if (state === "ok") t.classList.add('ok');
          if (state === "bad") t.classList.add('bad');

          d.appendChild(badge);
          d.appendChild(t);
          elGrid.appendChild(d);
        } else if (r === N && c < N){
          // col target cell
          const d = document.createElement('div');
          d.className = 'cell targetCell';
          if (isClearing) d.classList.add('clearFlash');
          const state = getColState(c);

          const badge = document.createElement('div');
          badge.className = 'badge';
          badge.textContent = `${sumCol(selected,c)}`; // show only current sum
          if (state === "ok") badge.classList.add('ok');
          if (state === "bad") badge.classList.add('bad');

          const t = document.createElement('div');
          t.className = 'target';
          t.textContent = colTarget[c];
          if (state === "ok") t.classList.add('ok');
          if (state === "bad") t.classList.add('bad');

          d.appendChild(badge);
          d.appendChild(t);
          elGrid.appendChild(d);
        } else {
          // corner: size cycle control
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'cornerBtn';
          b.textContent = String(N);

          // Tap: increase size (4→5→6→7→4)
          let suppressCornerClick = false;
          b.addEventListener('click', (e) => {
            if (suppressCornerClick){
              suppressCornerClick = false;
              e.preventDefault();
              e.stopPropagation();
              return;
            }
            playSfx('corner');
            const next = (N >= 7) ? 4 : (N + 1);
            setSize(next);
          });

          // Long-press (touch): decrease size (7→6→5→4→7)
          let lpCornerTimer = null;
          const isCoarse = () => (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);

          b.addEventListener('pointerdown', (ev) => {
            if (!(ev && ev.pointerType === 'touch') && !isCoarse()) return;
            try{ ev.preventDefault(); }catch(_){ }
            try{ b.setPointerCapture(ev.pointerId); }catch(_){ }

            if (lpCornerTimer) clearTimeout(lpCornerTimer);
            lpCornerTimer = setTimeout(() => {
              suppressCornerClick = true;
              playSfx('corner');
              const prev = (N <= 4) ? 7 : (N - 1);
              setSize(prev);
            }, 520);
          });

          const clearCornerLP = () => {
            if (lpCornerTimer) clearTimeout(lpCornerTimer);
            lpCornerTimer = null;
          };

          b.addEventListener('pointerup', clearCornerLP);
          b.addEventListener('pointercancel', clearCornerLP);
          b.addEventListener('pointermove', clearCornerLP);

          elGrid.appendChild(b);
        }
      }
    }

    if (isClearing){
      const clearText = document.createElement('div');
      clearText.className = 'clearText';
      clearText.textContent = 'CLEAR';
      elGrid.appendChild(clearText);
    }

    updateBodyFit();
  }
    // init
  setSize(4);
})();
})();
</script>
